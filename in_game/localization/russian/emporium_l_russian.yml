  emporium_legalism: "Эмпориум"
  emporium_legalism_desc: "Открывает Эмпориум — величественное торговое сооружение для столичного рыночного центра на берегу реки или моря."

  grand_emporium_banking: "Большой Эмпориум"
  grand_emporium_banking_desc: "Открывает Большой Эмпориум — расширенный торговый комплекс, удваивающий коммерческую мощь столицы."

  royal_emporium_merchants: "Королевский Эмпориум"
  royal_emporium_merchants_desc: "Открывает Королевский Эмпориум — престижное торговое учреждение, господствующее над коммерцией всего региона."

  imperial_emporium_port: "Имперский Эмпориум"
  imperial_emporium_port_desc: "Открывает Имперский Эмпориум — вершина торговой архитектуры, демонстрирующая коммерческую мощь империи на весь известный мир."

  # ========================
  # EVENTS
  # ========================
  emporium.1.name: "Эмпориум процветает"
  emporium.1.desc: "Прошло двенадцать месяцев с момента завершения строительства. Эмпориум  открыл свои двери, и купцы со всего региона стекаются в столицу, принося с собой золото и процветание."

  emporium.1.a: "Торговля процветает"
  emporium.1.a.tt: "Открытие Эмпориума приносит немедленную прибыль. +500 золота."

  emporium.1.b: "Реинвестиции в рынок"
  emporium.1.b.tt: "Вложите ресурсы обратно в рынок, чтобы привлечь ещё больше купцов. +25% Торгового потенциала на 6 месяцев, +1000 жителей."

  emporium.2.name: "Тень над рынком"
  emporium.2.desc: "Процветание рынка  привлекло мошенников и аферистов. Горожане обмануты и ограблены, репутация рынка под угрозой."

  emporium.2.a: "Провести чистки"
  emporium.2.a.tt: "Искоренить преступников силой. -300 жителей, -7 стабильности. Закрывает цепочку событий."

  emporium.2.b: "Компенсировать убытки"
  emporium.2.b.tt: "Заплатить, чтобы замолчать скандал и сохранить работу рынка. -150 золота. Проблема вернётся через 12 месяцев."

