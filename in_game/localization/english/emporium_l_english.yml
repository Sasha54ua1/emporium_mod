  # ========================
  # EVENTS
  # ========================
  emporium.1.name: "The Emporium Flourishes"
  emporium.1.desc: "Twelve months have passed since the completion of construction. The Emporium has opened its doors, and merchants from across the region flock to the capital."

  emporium.1.a: "Trade Flourishes"
  emporium.1.a.tt: "The Emporium's opening brings immediate profit. +500 Gold."

  emporium.1.b: "Reinvest in the Market"
  emporium.1.b.tt: "Pour resources back into the market to attract even more merchants. +25% Trade Potential for 6 months, +1000 population."

  emporium.2.name: "Shadow over the Market"
  emporium.2.desc: "The prosperity of the  market has attracted swindlers and fraudsters. Citizens have been deceived and robbed, and the reputation of the market is at risk."

  emporium.2.a: "Conduct Purges"
  emporium.2.a.tt: "Root out the criminals by force. -300 population, -7 Stability. Closes the event chain."

  emporium.2.b: "Compensate the Losses"
  emporium.2.b.tt: "Pay to silence the scandal and keep the market running. -150 Gold. The problem will return in 12 months."

